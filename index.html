<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0066BB">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="かんじドリル">
<title>さめ先生のかんじドリル</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=BIZ+UDPMincho:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:'BIZ UDPGothic','UD Digi Kyokasho NK-R','Hiragino Maru Gothic Pro','Yu Gothic UI',sans-serif;background:#0055AA;-webkit-text-size-adjust:100%}
:root{
  --blue:#0066BB;--blue-dk:#004A99;--sky:#E8F6FF;--off:#F2F8FF;
  --coral:#FF5C4D;--coral-lt:#FF8878;
  --gold:#FFD000;--gold-dk:#C9A000;
  --mint:#22CC88;--mint-dk:#179960;
  --dark:#1A2E4A;--gray:#607890;--white:#fff;
  --fk:'BIZ UDPMincho','UD Digi Kyokasho NK-R','Hiragino Mincho ProN','Yu Mincho',serif;
  --fm:'BIZ UDPGothic','UD Digi Kyokasho NK-R','Hiragino Maru Gothic Pro','Yu Gothic UI',sans-serif;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;opacity:0;transform:translateX(28px);pointer-events:none;transition:opacity .32s ease,transform .32s ease;padding-top:var(--st)}
.screen.active{opacity:1;transform:translateX(0);pointer-events:all}
.screen.exit{opacity:0;transform:translateX(-28px)}

/* HOME */
#s-home{background:linear-gradient(160deg,#0077CC 0%,#00AAEE 55%,#55DDFF 100%)}
.hbg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.bub{position:absolute;border-radius:50%;background:rgba(255,255,255,.13);animation:fb 5s ease-in-out infinite}
.b1{width:72px;height:72px;left:7%;bottom:15%;animation-delay:0s}
.b2{width:44px;height:44px;left:76%;bottom:28%;animation-delay:1.8s}
.b3{width:104px;height:104px;left:83%;bottom:50%;animation-delay:3.2s}
.b4{width:36px;height:36px;left:24%;bottom:60%;animation-delay:4.5s}
@keyframes fb{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-15px) scale(1.06)}}
.h-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;height:100%;padding:0 18px calc(18px + var(--sb));overflow-y:auto}
.h-head{display:flex;align-items:center;gap:14px;padding:clamp(18px,5.5vw,42px) 0 12px;width:100%;max-width:420px}
.shark-big{font-size:clamp(58px,16vw,80px);line-height:1;filter:drop-shadow(0 4px 10px rgba(0,0,0,.25));animation:sbob 3s ease-in-out infinite;flex-shrink:0}
@keyframes sbob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-8px) rotate(3deg)}}
.h-titles .h-sub{font-size:clamp(14px,4vw,18px);font-weight:700;color:rgba(255,255,255,.9)}
.h-titles .h-main{font-size:clamp(23px,6.5vw,30px);font-weight:900;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.2);line-height:1.2}
.sph{background:#fff;border-radius:26px;padding:13px 22px;font-size:clamp(14px,4.2vw,17px);font-weight:700;color:#004A99;text-align:center;box-shadow:0 4px 18px rgba(0,80,160,.18);width:100%;max-width:420px;margin-bottom:14px;line-height:1.7;position:relative}
.sph::before{content:'';position:absolute;top:-11px;left:52px;border:11px solid transparent;border-bottom-color:#fff;border-top:none}

/* MODE SELECTOR */
.mode-lbl{font-size:clamp(15px,4.5vw,19px);font-weight:700;color:rgba(255,255,255,.9);margin-bottom:8px;align-self:flex-start;width:100%;max-width:420px}
.mode-toggle{display:flex;gap:8px;width:100%;max-width:420px;margin-bottom:14px;background:rgba(0,0,0,.2);border-radius:16px;padding:5px}
.mode-btn{flex:1;border:none;border-radius:12px;padding:10px 8px;font-family:var(--fm);font-size:clamp(13px,3.8vw,16px);font-weight:700;cursor:pointer;transition:all .2s;background:transparent;color:rgba(255,255,255,.75)}
.mode-btn.active{background:#fff;color:#004A99;box-shadow:0 2px 8px rgba(0,0,0,.2)}

.g-lbl{font-size:clamp(15px,4.5vw,19px);font-weight:700;color:rgba(255,255,255,.9);margin-bottom:10px;align-self:flex-start;width:100%;max-width:420px}
.g-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;width:100%;max-width:420px;margin-bottom:14px}
.gbtn{background:#fff;border:none;border-radius:18px;padding:clamp(14px,4.5vw,22px) 12px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.16);transition:transform .1s,box-shadow .1s;position:relative;overflow:hidden}
.gbtn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.55),transparent 55%)}
.gbtn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.16)}
.gbtn[data-g="1"]{background:linear-gradient(135deg,#FFE84D,#FFD000)}
.gbtn[data-g="2"]{background:linear-gradient(135deg,#72F0A8,#22CC88)}
.gbtn[data-g="3"]{background:linear-gradient(135deg,#7DD8FF,#0088DD)}
.gbtn[data-g="4"]{background:linear-gradient(135deg,#FFAA96,#FF5C4D)}
.g-num{font-family:var(--fk);font-size:clamp(40px,12vw,58px);font-weight:700;color:#1A2E4A;line-height:1}
.g-txt{font-size:clamp(12px,3.5vw,15px);font-weight:700;color:#1A2E4A}
.stats-bar{background:rgba(255,255,255,.2);backdrop-filter:blur(8px);border-radius:18px;padding:13px 16px;width:100%;max-width:420px;display:flex;justify-content:space-around}
.st-it{display:flex;flex-direction:column;align-items:center;gap:3px}
.st-ic{font-size:18px}
.st-lb{font-size:10px;font-weight:700;color:rgba(255,255,255,.85);text-align:center;line-height:1.4}
.st-vl{font-size:clamp(18px,5vw,24px);font-weight:900;color:#fff}

/* TOP BAR */
.tbar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#004A99;flex-shrink:0}
.bkbtn{background:rgba(255,255,255,.22);border:none;border-radius:10px;padding:9px 14px;font-family:var(--fm);font-size:clamp(13px,3.8vw,15px);font-weight:700;color:#fff;cursor:pointer;white-space:nowrap}
.bkbtn:active{background:rgba(255,255,255,.38)}
.step-dots{display:flex;gap:7px;align-items:center}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.3);transition:background .3s,transform .3s}
.dot.on{background:#FFD000;transform:scale(1.3)}
.step-lbl{flex:1;text-align:center;font-size:13px;font-weight:700;color:rgba(255,255,255,.8)}
.shark-sm{font-size:clamp(28px,8vw,36px);flex-shrink:0;animation:sbob 3s ease-in-out infinite}

/* LESSON SCREENS */
.lesson-screen{background:var(--sky)}
.shark-row{display:flex;align-items:flex-end;gap:10px;padding:10px 16px 0;flex-shrink:0}
.shark-mid{font-size:clamp(44px,13vw,62px);flex-shrink:0;animation:sbob 2.5s ease-in-out infinite}
.bubble-msg{background:#fff;border-radius:20px 20px 20px 4px;padding:11px 18px;font-size:clamp(14px,4.2vw,17px);font-weight:700;color:#004A99;line-height:1.6;box-shadow:0 3px 14px rgba(0,80,160,.15);flex:1;min-width:0}

/* WORD / KANJI display - Step 1 hero */
.kanji-hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:4px 20px;min-height:0}
.word-display{font-family:var(--fk);font-size:clamp(56px,16vw,100px);font-weight:700;color:var(--dark);line-height:1.1;text-align:center;transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
.word-display.pop{transform:scale(1.09)}
.k-emoji-big{font-size:clamp(50px,14vw,80px);line-height:1;animation:ep 2.2s ease-in-out infinite}
@keyframes ep{0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}
.mode-tag{display:inline-block;background:linear-gradient(135deg,var(--gold),var(--gold-dk));border-radius:999px;padding:4px 16px;font-size:clamp(12px,3.5vw,14px);font-weight:700;color:var(--dark);margin-bottom:2px}

/* speak button */
.spk-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,#0077CC,#004A99);border:none;border-radius:999px;padding:clamp(13px,4vw,17px) clamp(26px,7vw,40px);font-family:var(--fm);font-size:clamp(17px,5vw,22px);font-weight:900;color:#fff;cursor:pointer;box-shadow:0 6px 0 #002A70;margin:0 18px;flex-shrink:0;transition:transform .1s,box-shadow .1s}
.spk-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #002A70}
.spk-btn.speaking{background:linear-gradient(135deg,var(--mint),var(--mint-dk));box-shadow:0 6px 0 #0D5C38;animation:pglow .5s ease-in-out infinite alternate}
@keyframes pglow{from{box-shadow:0 6px 0 #0D5C38}to{box-shadow:0 6px 0 #0D5C38,0 0 18px rgba(34,204,136,.5)}}
.spk-ic{font-size:clamp(22px,6vw,28px)}
.reading-show{text-align:center;font-size:clamp(22px,6.5vw,30px);font-weight:900;color:var(--blue);letter-spacing:.12em;min-height:38px;padding:4px 18px;flex-shrink:0}

/* next button */
.next-btn{margin:6px 18px calc(10px + var(--sb));background:linear-gradient(135deg,var(--gold),var(--gold-dk));border:none;border-radius:18px;padding:clamp(14px,4.5vw,18px);font-family:var(--fm);font-size:clamp(17px,5vw,21px);font-weight:900;color:var(--dark);cursor:pointer;box-shadow:0 6px 0 #8A6000;flex-shrink:0;transition:transform .1s,box-shadow .1s;display:flex;align-items:center;justify-content:center;gap:8px}
.next-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #8A6000}

/* STEP 2 & 3 */
#s-step2{background:var(--sky)}
#s-step3{background:var(--off)}
.step2-top{display:flex;flex-direction:column;align-items:center;padding:6px 18px 2px;flex-shrink:0;gap:4px}
.word-sm{font-family:var(--fk);font-size:clamp(40px,12vw,72px);font-weight:700;color:var(--dark);line-height:1.1;text-align:center}
.emoji-sm{font-size:clamp(28px,8vw,44px);line-height:1}
.spk-sm{display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,#0077CC,#004A99);border:none;border-radius:999px;padding:9px 22px;font-family:var(--fm);font-size:clamp(14px,4vw,17px);font-weight:700;color:#fff;cursor:pointer;box-shadow:0 4px 0 #002A70;margin:2px 0 0;transition:transform .1s,box-shadow .1s}
.spk-sm:active{transform:translateY(3px);box-shadow:0 1px 0 #002A70}
.spk-sm.speaking{background:linear-gradient(135deg,var(--mint),var(--mint-dk));box-shadow:0 4px 0 #0D5C38}

/* Step2 grid: 6-word/kanji tiles */
.quiz-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 16px;gap:10px;min-height:0}
.word-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;width:100%;max-width:400px}
.wgrid-btn{background:#fff;border:3px solid #C4E4FF;border-radius:14px;padding:clamp(10px,3vw,15px) 6px;font-family:var(--fk);font-size:clamp(16px,5vw,24px);font-weight:700;color:var(--dark);cursor:pointer;text-align:center;box-shadow:0 4px 0 rgba(0,80,160,.12);transition:transform .12s,box-shadow .12s;line-height:1.3;min-height:clamp(52px,14vw,72px);display:flex;align-items:center;justify-content:center}
.wgrid-btn:active:not(:disabled){transform:translateY(2px);box-shadow:0 2px 0 rgba(0,80,160,.12)}
.wgrid-btn.correct{background:linear-gradient(135deg,#C8FAE8,#90EFCC);border-color:var(--mint);animation:cbnc .5s cubic-bezier(.34,1.56,.64,1)}
.wgrid-btn.wrong{background:linear-gradient(135deg,#FFE0DC,#FFC0B4);border-color:var(--coral);animation:cshk .38s ease}
.wgrid-btn.dim{opacity:.3}
@keyframes cbnc{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes cshk{0%,100%{transform:translateX(0)}30%{transform:translateX(-7px)}70%{transform:translateX(7px)}}

/* Step3: 4-choice kanji (from reading) */
.hira-reading{font-size:clamp(28px,8.5vw,44px);font-weight:900;color:var(--dark);letter-spacing:.12em;text-align:center;padding:2px 0}
.hira-label{font-size:clamp(15px,4.5vw,18px);font-weight:700;color:var(--gray);text-align:center}
.word-choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:400px}
.wc-btn{background:#fff;border:3px solid #C4E4FF;border-radius:16px;padding:clamp(14px,4.5vw,20px) 6px;font-family:var(--fk);font-size:clamp(22px,7vw,38px);font-weight:700;color:var(--dark);cursor:pointer;text-align:center;box-shadow:0 4px 0 rgba(0,80,160,.12);transition:transform .12s,box-shadow .12s;line-height:1.3;min-height:clamp(70px,18vw,100px);display:flex;align-items:center;justify-content:center}
.wc-btn:active:not(:disabled){transform:translateY(2px)}
.wc-btn.correct{background:linear-gradient(135deg,#C8FAE8,#90EFCC);border-color:var(--mint);animation:cbnc .5s cubic-bezier(.34,1.56,.64,1)}
.wc-btn.wrong{background:linear-gradient(135deg,#FFE0DC,#FFC0B4);border-color:var(--coral);animation:cshk .38s ease}

/* FEEDBACK */
.fb-ov{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)}
.fb-box{background:#fff;border-radius:36px;padding:clamp(22px,7vw,36px) clamp(26px,8vw,44px);text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.28);animation:pin .4s cubic-bezier(.34,1.56,.64,1);max-width:300px;width:88%}
@keyframes pin{from{transform:scale(.55);opacity:0}to{transform:scale(1);opacity:1}}
.fb-shk{font-size:clamp(52px,15vw,68px);display:block;animation:sbob 1s ease-in-out infinite}
.fb-ej{font-size:clamp(44px,13vw,58px);display:block;margin:5px 0}
.fb-msg{font-size:clamp(22px,6.5vw,30px);font-weight:900;margin:5px 0 2px}
.fb-msg.ok{color:var(--mint-dk)}.fb-msg.ng{color:var(--coral)}
.fb-rd{font-size:clamp(15px,4.8vw,20px);font-weight:700;color:var(--blue);letter-spacing:.08em;line-height:1.5}

/* RESULT */
#s-result{background:linear-gradient(160deg,#004A99,#0099CC)}
.res-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.cft{position:absolute;inset:0}
.cp{position:absolute;top:-20px;border-radius:4px;animation:cfl linear forwards}
@keyframes cfl{from{transform:translateY(0) rotate(0deg);opacity:1}to{transform:translateY(110vh) rotate(720deg);opacity:0}}
.r-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:20px 22px calc(22px + var(--sb));gap:10px;overflow-y:auto}
.r-shk{font-size:clamp(60px,18vw,84px);animation:sbob 2s ease-in-out infinite}
.r-title{font-size:clamp(22px,6.5vw,30px);font-weight:900;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.2)}
.sc-box{background:#fff;border-radius:999px;padding:clamp(14px,5vw,20px) clamp(30px,9vw,48px);display:flex;align-items:baseline;gap:8px;box-shadow:0 8px 28px rgba(0,0,0,.2)}
.sc-n{font-family:var(--fk);font-size:clamp(58px,18vw,78px);font-weight:700;color:#004A99;line-height:1}
.sc-of{font-size:clamp(16px,4.5vw,20px);font-weight:700;color:var(--gray)}
.r-rate{font-size:clamp(16px,4.8vw,20px);font-weight:700;color:#fff;background:rgba(255,255,255,.2);border-radius:999px;padding:7px 22px}
.r-msg{font-size:clamp(18px,5.5vw,24px);font-weight:900;color:var(--gold);text-shadow:0 2px 6px rgba(0,0,0,.25);text-align:center}
.r-btns{display:flex;gap:10px;width:100%;max-width:360px}
.r-btn{flex:1;border:none;border-radius:16px;padding:clamp(15px,4.5vw,19px);font-family:var(--fm);font-size:clamp(15px,4.5vw,19px);font-weight:700;cursor:pointer;transition:transform .1s,box-shadow .1s}
.r-btn-p{background:linear-gradient(135deg,var(--gold),var(--gold-dk));color:var(--dark);box-shadow:0 6px 0 #8A6000}
.r-btn-s{background:rgba(255,255,255,.22);color:#fff;box-shadow:0 6px 0 rgba(0,0,0,.18)}
.r-btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.2)}
.wrong-wrap{width:100%;max-width:380px}
.wrong-lbl{font-size:14px;font-weight:700;color:rgba(255,255,255,.8);text-align:center;margin-bottom:8px}
.wrong-list{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.w-tag{background:rgba(255,255,255,.18);border-radius:12px;padding:7px 14px;font-family:var(--fk);font-size:clamp(18px,5.5vw,24px);font-weight:700;color:#fff;text-align:center;line-height:1.4}
.w-tag small{display:block;font-family:var(--fm);font-size:11px;font-weight:700;opacity:.85}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,85,170,.3);border-radius:2px}
</style>
</head>
<body>

<!-- HOME -->
<div id="s-home" class="screen active">
  <div class="hbg"><div class="bub b1"></div><div class="bub b2"></div><div class="bub b3"></div><div class="bub b4"></div></div>
  <div class="h-inner">
    <div class="h-head">
      <div class="shark-big">🦈</div>
      <div class="h-titles"><div class="h-sub">さめ先生の</div><div class="h-main">かんじドリル</div></div>
    </div>
    <div class="sph" id="h-msg">いっしょに　たのしく　まなぼう！</div>

    <div class="mode-lbl">モードをえらんでね</div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-kanji" onclick="setMode('kanji')">🔤 かんじ</button>
      <button class="mode-btn" id="btn-word" onclick="setMode('word')">📖 たんご</button>
    </div>

    <div class="g-lbl">なんねんせい？</div>
    <div class="g-grid">
      <button class="gbtn" data-g="1" onclick="selG(1)"><span class="g-num">1</span><span class="g-txt">ねんせい</span></button>
      <button class="gbtn" data-g="2" onclick="selG(2)"><span class="g-num">2</span><span class="g-txt">ねんせい</span></button>
      <button class="gbtn" data-g="3" onclick="selG(3)"><span class="g-num">3</span><span class="g-txt">ねんせい</span></button>
      <button class="gbtn" data-g="4" onclick="selG(4)"><span class="g-num">4</span><span class="g-txt">ねんせい</span></button>
    </div>
    <div class="stats-bar">
      <div class="st-it"><span class="st-ic">⭐</span><span class="st-lb">きょうの<br>せいかい</span><span class="st-vl" id="st-ok">0</span></div>
      <div class="st-it"><span class="st-ic">📊</span><span class="st-lb">せいとう<br>りつ</span><span class="st-vl" id="st-rt">－</span></div>
      <div class="st-it"><span class="st-ic">❤️</span><span class="st-lb">にがて<br>もの</span><span class="st-vl" id="st-wr">0</span></div>
    </div>
  </div>
</div>

<!-- STEP 1 -->
<div id="s-step1" class="screen lesson-screen">
  <div class="tbar">
    <button class="bkbtn" onclick="goHome()">◀ もどる</button>
    <div class="step-dots"><div class="dot on"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="step-lbl">STEP 1</div>
    <div class="shark-sm">🦈</div>
  </div>
  <div class="shark-row">
    <div class="shark-mid">🦈</div>
    <div class="bubble-msg" id="s1-msg">よみあげボタンを　おしてみよう！</div>
  </div>
  <div class="kanji-hero">
    <div class="mode-tag" id="s1-tag">かんじ</div>
    <div class="word-display" id="s1-word">花</div>
    <div class="k-emoji-big" id="s1-emoji">🌸</div>
  </div>
  <button class="spk-btn" id="s1-spkbtn" onclick="step1Speak()">
    <span class="spk-ic">🔊</span><span>よみあげる</span>
  </button>
  <div class="reading-show" id="s1-reading"></div>
  <button class="next-btn" onclick="goStep2()">つぎへ ▶</button>
</div>

<!-- STEP 2 -->
<div id="s-step2" class="screen lesson-screen">
  <div class="tbar">

// ---- SCREEN ----
function show(id) {
  const cur = document.querySelector('.screen.active');
  const nxt = document.getElementById(id);
  if (cur === nxt) return;
  if (cur) { cur.classList.add('exit'); setTimeout(() => cur.classList.remove('active','exit'), 320); }
  setTimeout(() => nxt.classList.add('active'), 10);
}

// ---- HOME ----
function initHome() {
  updateStats();
  document.getElementById('h-msg').textContent = rnd(MSG.home);
}
function setMode(m) {
  G.mode = m;
  document.getElementById('btn-kanji').classList.toggle('active', m === 'kanji');
  document.getElementById('btn-word').classList.toggle('active', m === 'word');
}
function selG(g) {
  G.grade = g;
  const src = G.mode === 'word' ? (WD[g] || []) : (KD[g] || []);
  G.deck = [...src].sort(() => Math.random() - .5).slice(0, Math.min(src.length, 10));
  G.idx = 0; G.totalQ = 0; G.totalOk = 0; G.wrongItems = [];
  loadStep1(); show('s-step1');
}
function goHome() {
  window.speechSynthesis && window.speechSynthesis.cancel();
  show('s-home'); initHome();
}

// ---- helpers ----
function getItem(it) {
  // normalise: word mode has .word, kanji mode has .kanji
  return { display: it.word || it.kanji, read: it.read, emoji: it.emoji };
}
function getPool() {
  return G.mode === 'word' ? (WD[G.grade] || []) : (KD[G.grade] || []);
}

// ---- STEP 1 ----
function loadStep1() {
  const it = G.deck[G.idx];
  const { display, read, emoji } = getItem(it);
  const el = document.getElementById('s1-word');
  el.textContent = display;
  document.getElementById('s1-emoji').textContent = emoji;
  document.getElementById('s1-reading').textContent = '';
  document.getElementById('s1-tag').textContent = G.mode === 'word' ? 'たんご' : 'かんじ';
  document.getElementById('s1-msg').textContent = '「' + read + '」を　よもう！　ボタンを　おしてね！';
  el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
  setTimeout(() => el.classList.remove('pop'), 400);
  G.s2done = false; G.s3done = false;
}
function step1Speak() {
  const it = G.deck[G.idx];
  const { read } = getItem(it);
  document.getElementById('s1-reading').textContent = read;
  document.getElementById('s1-msg').textContent = '「' + read + '」　いっしょに　いってみよう！';
  speak(read, 's1-spkbtn');
}
function goStep2() { loadStep2(); show('s-step2'); }
function goStep1() { show('s-step1'); }

// ---- STEP 2: find same in 6-grid ----
function loadStep2() {
  const it = G.deck[G.idx];
  const { display, read, emoji } = getItem(it);
  document.getElementById('s2-word').textContent = display;
  document.getElementById('s2-emoji').textContent = emoji;
  document.getElementById('s2-msg').textContent = rnd(MSG.s2);

  const pool = getPool();
  const dist = pool.filter(x => getItem(x).display !== display).sort(() => Math.random() - .5).slice(0, 5);
  const items = [...dist, it].sort(() => Math.random() - .5);

  const grid = document.getElementById('s2-grid');
  grid.innerHTML = '';
  items.forEach(c => {
    const b = document.createElement('button');
    b.className = 'wgrid-btn';
    b.textContent = getItem(c).display;
    b.onclick = () => step2Pick(b, c, it);
    grid.appendChild(b);
  });
}
function step2Speak() { speak(getItem(G.deck[G.idx]).read, 's2-spkbtn'); }
function step2Pick(btn, chosen, correct) {
  if (G.s2done) return;
  document.querySelectorAll('#s2-grid .wgrid-btn').forEach(b => { b.disabled = true; b.onclick = null; });
  const ok = getItem(chosen).display === getItem(correct).display;
  G.s2done = true;
  if (ok) {
    btn.classList.add('correct');
    document.querySelectorAll('#s2-grid .wgrid-btn').forEach(b => { if (b !== btn) b.classList.add('dim'); });
    G.totalQ++; G.totalOk++; G.todayOk++; G.todayTot++;
    saveSt(); showFB(true, correct, () => { loadStep3(); show('s-step3'); });
  } else {
    btn.classList.add('wrong');
    G.totalQ++; G.todayTot++;
    if (!G.wrongItems.some(w => getItem(w).display === getItem(correct).display)) G.wrongItems.push(correct);
    addWrong(correct); saveSt();
    showFB(false, correct, () => { loadStep3(); show('s-step3'); });
  }
}

// ---- STEP 3: choose word/kanji from hiragana ----
function loadStep3() {
  const it = G.deck[G.idx];
  const { display, read, emoji } = getItem(it);
  document.getElementById('s3-emoji').textContent = emoji;
  document.getElementById('s3-reading').textContent = read;
  document.getElementById('s3-msg').textContent = '「' + read + '」に　あうのは　どれかな？';

  const pool = getPool();
  const dist = pool.filter(x => getItem(x).display !== display).sort(() => Math.random() - .5).slice(0, 3);
  const items = [...dist, it].sort(() => Math.random() - .5);

  const grid = document.getElementById('s3-grid');
  grid.innerHTML = '';
  items.forEach(c => {
    const b = document.createElement('button');
    b.className = 'wc-btn';
    b.textContent = getItem(c).display;
    b.onclick = () => step3Pick(b, c, it);
    grid.appendChild(b);
  });
}
function step3Speak() { speak(getItem(G.deck[G.idx]).read, 's3-spkbtn'); }
function goStep2b() { loadStep2(); show('s-step2'); }
function step3Pick(btn, chosen, correct) {
  if (G.s3done) return;
  document.querySelectorAll('#s3-grid .wc-btn').forEach(b => { b.disabled = true; b.onclick = null; });
  const ok = getItem(chosen).display === getItem(correct).display;
  G.s3done = true;
  if (ok) {
    btn.classList.add('correct');
    G.totalQ++; G.totalOk++; G.todayOk++; G.todayTot++;
    saveSt(); showFB(true, correct, afterStep3);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('#s3-grid .wc-btn').forEach(b => { if (b.textContent === getItem(correct).display) b.classList.add('correct'); });
    G.totalQ++; G.todayTot++;
    if (!G.wrongItems.some(w => getItem(w).display === getItem(correct).display)) G.wrongItems.push(correct);
    addWrong(correct); saveSt();
    showFB(false, correct, afterStep3);
  }
}
function afterStep3() {
  G.idx++;
  if (G.idx < G.deck.length) { loadStep1(); show('s-step1'); }
  else showResult();
}

// ---- FEEDBACK ----
function showFB(ok, item, cb) {
  const { display, read } = getItem(item);
  const fb = document.getElementById('fb');
  document.getElementById('fb-ej').textContent = ok ? '🎉' : '😊';
  const m = document.getElementById('fb-msg');
  m.textContent = ok ? rnd(MSG.ok) : rnd(MSG.ng);
  m.className = 'fb-msg ' + (ok ? 'ok' : 'ng');
  document.getElementById('fb-rd').textContent = ok
    ? '「' + display + '」→「' + read + '」せいかい！'
    : '「' + display + '」→「' + read + '」だよ';
  fb.style.display = 'flex';
  speak(read);
  setTimeout(() => { fb.style.display = 'none'; if (cb) cb(); }, 1500);
}

// ---- RESULT ----
function showResult() {
  const ok = G.totalOk, tot = G.totalQ, rt = tot ? Math.round(ok / tot * 100) : 0;
  document.getElementById('r-score').textContent = ok;
  document.getElementById('r-of').textContent = '/ ' + tot + 'もん';
  document.getElementById('r-rate').textContent = 'せいとうりつ　' + rt + '%';
  const t = rt === 100 ? 'かんぺき！🏆' : rt >= 80 ? 'すごい！🎉' : rt >= 60 ? 'がんばったね！' : 'チャレンジ！';
  const msg = rt === 100 ? 'ぜんもん　せいかい！　さすが！' : rt >= 80 ? 'よくできました！　えらい！' : rt >= 60 ? 'もうすこし！　れんしゅうしよう！' : 'またいっしょに　れんしゅうしようね！';
  document.getElementById('r-title').textContent = t;
  document.getElementById('r-msg').textContent = msg;
  if (G.wrongItems.length) {
    document.getElementById('ww').style.display = 'block';
    document.getElementById('wl').innerHTML = G.wrongItems.map(k => {
      const { display, read } = getItem(k);
      return '<div class="w-tag">' + display + '<small>' + read + '</small></div>';
    }).join('');
  } else document.getElementById('ww').style.display = 'none';
  show('s-result');
  if (rt >= 60) mkCft();
  setTimeout(() => speak(rt >= 80 ? 'やったね！すごい！' : 'よくがんばりました！'), 500);
}
function again() {
  const src = G.mode === 'word' ? (WD[G.grade] || []) : (KD[G.grade] || []);
  G.deck = [...src].sort(() => Math.random() - .5).slice(0, Math.min(src.length, 10));
  G.idx = 0; G.totalQ = 0; G.totalOk = 0; G.wrongItems = [];
  loadStep1(); show('s-step1');
}
function mkCft() {
  const w = document.getElementById('cft'); w.innerHTML = '';
  const cs = ['#FFD700','#FF5C4D','#22CC88','#0077CC','#A78BFA','#FF9B8A'];
  for (let i = 0; i < 55; i++) {
    const d = document.createElement('div'); d.className = 'cp';
    d.style.cssText = 'left:' + Math.random()*100 + '%;width:' + (8+Math.random()*12) + 'px;height:' + (8+Math.random()*12) + 'px;background:' + cs[~~(Math.random()*cs.length)] + ';animation-duration:' + (1.4+Math.random()*2) + 's;animation-delay:' + (Math.random()*.9) + 's';
    w.appendChild(d);
  }
}

// ---- SPEECH ----
function speak(txt, btnId) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const btn = btnId ? document.getElementById(btnId) : null;
  const u = new SpeechSynthesisUtterance(txt);
  u.lang = 'ja-JP'; u.rate = 0.78; u.pitch = 1.1;
  u.onstart = () => { if (btn) btn.classList.add('speaking'); };
  u.onend = u.onerror = () => { if (btn) btn.classList.remove('speaking'); };
  window.speechSynthesis.speak(u);
}

// ---- STATS ----
function saveSt() {
  const d = new Date().toISOString().split('T')[0];
  const s = JSON.parse(localStorage.getItem('ks') || '{}');
  s[d] = { ok: G.todayOk, tot: G.todayTot };
  localStorage.setItem('ks', JSON.stringify(s));
  updateStats();
}
function updateStats() {
  const d = new Date().toISOString().split('T')[0];
  const s = JSON.parse(localStorage.getItem('ks') || '{}');
  const td = s[d] || { ok: 0, tot: 0 };
  G.todayOk = td.ok; G.todayTot = td.tot;
  document.getElementById('st-ok').textContent = td.ok;
  document.getElementById('st-rt').textContent = td.tot ? Math.round(td.ok / td.tot * 100) + '%' : '－';
  document.getElementById('st-wr').textContent = ldW().length;
}
function ldW() { return JSON.parse(localStorage.getItem('kw') || '[]'); }
function addWrong(it) {
  const l = ldW();
  const key = getItem(it).display;
  if (!l.some(x => getItem(x).display === key)) l.push(it);
  localStorage.setItem('kw', JSON.stringify(l));
}

window.addEventListener('DOMContentLoaded', initHome);
</script>
